version: '3.8'
services:
  db:
    image: postgres:16
    container_name: kyc-postgres
    environment:
      POSTGRES_USER: kycuser
      POSTGRES_PASSWORD: kycpassword
      POSTGRES_DB: kyc_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
