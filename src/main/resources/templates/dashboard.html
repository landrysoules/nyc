<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::content}, title='Dashboard - KYC SecurePortal')}">
<head>
    <title>Dashboard</title>
</head>
<body>
    <div th:fragment="content" x-data="dashboard()" class="w-full max-w-6xl max-h-full">
        <!-- Header -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden mb-6 border border-gray-100 flex items-center justify-between p-6">
             <div>
                 <h1 class="text-2xl font-bold text-gray-900">Welcome, <span th:text="${username}" class="text-indigo-600">User</span>!</h1>
                 <p class="text-gray-500 text-sm mt-1">Manage KYC operations securely.</p>
             </div>
             <div>
                <form th:action="@{/auth/logout}" method="POST">
                   <button type="submit" class="text-sm font-medium text-gray-500 hover:text-gray-900 transition-colors">
                       Sign out
                   </button>
                </form>
             </div>
        </div>

        <!-- Dashboard Content & Tabs -->
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
            <!-- Tabs Menu -->
            <div class="border-b border-gray-200">
                <nav class="-mb-px flex space-x-8 px-8" aria-label="Tabs" id="tabs-container">
                    <button hx-get="/dashboard/tab/natural-persons" hx-target="#tab-content" hx-trigger="click, load"
                            @click="setActiveTab('natural-persons')"
                            :class="isTabActive('natural-persons') ? 'text-indigo-600 border-indigo-500' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
                            class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                        Natural Persons
                    </button>
                    
                    <button hx-get="/dashboard/tab/legal-entities" hx-target="#tab-content" 
                            @click="setActiveTab('legal-entities')"
                            :class="isTabActive('legal-entities') ? 'text-indigo-600 border-indigo-500' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
                            class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                        Legal Entities
                    </button>

                    <button hx-get="/dashboard/tab/contracts" hx-target="#tab-content" 
                            @click="setActiveTab('contracts')"
                            :class="isTabActive('contracts') ? 'text-indigo-600 border-indigo-500' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'"
                            class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">
                        Contracts
                    </button>
                </nav>
            </div>

            <!-- Tab Content -->
            <div class="p-8" id="tab-content">
                <!-- Data loaded via HTMX -->
                <div class="flex justify-center items-center py-10">
                    <svg class="animate-spin h-8 w-8 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </div>
            </div>
        </div>



    </div>
</body>
</html>
