<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::content}, title='Login - KYC Backoffice')}">
<head>
    <title>Login</title>
</head>
<body>
    <div th:fragment="content" class="w-full max-w-md space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100 backdrop-blur-sm bg-white/90">
        <div>
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900 tracking-tight">
                Authentication
            </h2>
            <p class="mt-2 text-center text-sm text-gray-500">
                Secure access via 2-Factor Auth
            </p>
        </div>
        
        <div id="auth-container">
            <div th:replace="~{fragments/login-form :: login-content}"></div>
        </div>
    </div>
</body>
</html>
