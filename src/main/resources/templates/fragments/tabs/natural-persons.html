<div th:fragment="content" class="fade-in">
    <div class="flex justify-between items-center mb-6 border-b pb-4">
        <h3 class="text-lg leading-6 font-medium text-gray-900">Natural Persons</h3>
        <button hx-get="/dashboard/modal/natural-person/0" hx-target="#modal-content" onclick="openModal()" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Create New
        </button>
    </div>

    <div class="overflow-x-auto rounded-lg border border-gray-200">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">First Name</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Last Name</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nationality</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr th:each="person : ${persons}" 
                    th:attr="hx-get=@{/dashboard/modal/natural-person/{id}(id=${person.id})}, hx-target='#modal-content'" 
                    onclick="openModal()"
                    class="hover:bg-gray-50 cursor-pointer transition-colors duration-200">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${person.id}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${person.firstName}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${person.lastName}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${person.nationality}"></td>
                </tr>
            </tbody>
        </table>
        
        <div th:if="${#lists.isEmpty(persons)}" class="text-center py-10 text-gray-500 text-sm">
            No natural persons found.
        </div>
    </div>
</div>
