<div th:fragment="content" class="fade-in">
    <div class="flex justify-between items-center mb-6 border-b pb-4">
        <h3 class="text-lg leading-6 font-medium text-gray-900">Legal Entities</h3>
        <button hx-get="/dashboard/details/legal-entity/0" hx-target="#tab-content" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            Create New
        </button>
    </div>

    <div class="overflow-x-auto rounded-lg border border-gray-200">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Country</th>
                    <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Registration Num</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                <tr th:each="entity : ${entities}" 
                    th:attr="hx-get=@{/dashboard/details/legal-entity/{id}(id=${entity.id})}, hx-target='#tab-content'" 
                    class="hover:bg-gray-50 cursor-pointer transition-colors duration-200">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${entity.id}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${entity.name}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${entity.country}"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${entity.registrationNumber}"></td>
                </tr>
            </tbody>
        </table>
        
        <div th:if="${#lists.isEmpty(entities)}" class="text-center py-10 text-gray-500 text-sm">
            No legal entities found.
        </div>
    </div>
</div>
