<div th:fragment="panel" class="bg-ihub-bg fade-in w-full relative pb-24" th:attr="x-data='contractForm(' + (${contract.id == null}) + ')'">
    
    <!-- Top Profile Header -->
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center bg-white border border-gray-100 px-6 py-4 rounded-t-[20px] shadow-sm mb-0 z-10 relative">
        <div class="flex items-start">
            <button hx-get="/dashboard/tab/contracts" hx-target="#tab-content" class="mt-1 mr-4 rounded-full border border-gray-300 w-8 h-8 flex items-center justify-center text-gray-400 hover:text-ihub-teal hover:border-ihub-teal transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <div class="w-12 h-12 rounded-full bg-gray-200 flex items-center justify-center text-gray-400 mr-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </div>
            <div class="flex flex-col">
                <div class="flex items-center space-x-3 mb-1">
                    <h3 class="text-xl font-bold uppercase tracking-tight text-blue-500" th:text="${contract.id != null ? contract.name : 'CREATE CONTRACT'}"></h3>
                </div>
                <!-- ID & Tags -->
                <div class="flex items-center space-x-2 text-xs font-bold text-gray-500 mb-2">
                    <span th:if="${contract.id != null}">i-Hub ID <span class="font-normal ml-1" th:text="${contract.id}"></span></span>
                    <span th:if="${contract.id != null}" class="bg-ihub-teal text-white px-2 py-0.5 rounded text-[9px] tracking-wide ml-2">SIMPLE</span>
                    <div th:if="${contract.id != null}" class="ml-2">
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-widest bg-green-100 text-green-700" th:if="${contract.status == 'ACTIVE'}" th:text="${contract.status}"></span>
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-[9px] font-bold uppercase tracking-widest bg-gray-100 text-gray-600" th:if="${contract.status != 'ACTIVE'}" th:text="${contract.status}"></span>
                    </div>
                </div>
                <!-- Metadata -->
                <div th:if="${contract.id != null}" class="flex gap-6 mt-1 text-[10px] text-gray-500 uppercase tracking-wide">
                    <div>
                        <span class="font-bold">CREATED BY</span><br/>
                        System<br/><span class="font-normal capitalize text-gray-400">On 28/08/2025</span>
                    </div>
                    <div>
                        <span class="font-bold">MODIFIED BY</span><br/>
                        User<br/><span class="font-normal capitalize text-gray-400">On 28/08/2025</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Actions -->
        <div class="flex gap-8 items-center mt-4 lg:mt-0">
            <div th:if="${contract.id != null}" class="flex gap-2">
                <button class="bg-orange-400 text-white rounded-full px-4 py-1.5 text-[10px] font-bold uppercase hover:bg-orange-500 transition-colors shadow-sm flex items-center">
                    Pending signature
                </button>
                <button class="bg-ihub-teal text-white rounded-full px-4 py-1.5 text-[10px] font-bold uppercase hover:bg-[#12a1b0] transition-colors shadow-sm flex items-center">
                    Assign to me
                </button>
                <button class="w-8 h-8 rounded-full bg-ihub-teal flex items-center justify-center text-white"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M6 10a2 2 0 11-4 0 2 2 0 014 0zM12 10a2 2 0 11-4 0 2 2 0 014 0zM16 12a2 2 0 100-4 2 2 0 000 4z" /></svg></button>
            </div>
        </div>
    </div>
    
    <!-- Sub-Navigation Bar -->
    <div class="bg-ihub-tealDark px-4 flex justify-between rounded-bl-lg items-end pt-3">
        <div class="flex gap-1 overflow-x-auto hide-scrollbar">
            <button class="bg-white text-ihub-teal rounded-t-lg px-6 py-2.5 text-xs font-medium tracking-wide border-0 focus:outline-none">Data</button>
            <button class="text-white/80 hover:text-white px-5 py-2.5 text-xs font-medium tracking-wide">Documents</button>
            <button class="text-white/80 hover:text-white px-5 py-2.5 text-xs font-medium tracking-wide">Linked Entities</button>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="w-full bg-white shadow-sm border border-gray-100 p-8 min-h-[500px]">
        <div id="view-mode" x-show="!isEditMode">
            <div class="flex justify-end mb-4">
                <button type="button" @click="toggleEditMode()" class="px-6 py-2 rounded-full border text-ihub-teal border-ihub-teal font-bold text-xs uppercase hover:bg-cyan-50 transition-colors">
                    Edit Data
                </button>
            </div>
        </div>
        
        <div id="edit-mode">
            <form th:fragment="edit-form" hx-post="/dashboard/details/contract" hx-target="#tab-content" id="contract-form">
                <fieldset x-bind:disabled="!isEditMode" class="w-full border-none p-0 m-0">
                <div hx-post="/dashboard/validate/contract" hx-trigger="keyup delay:500ms from:input, change from:select" hx-include="#contract-form" hx-swap="none"></div>
                <input type="hidden" name="id" th:value="${contract.id}"/>
                
                <h3 class="text-xl font-bold text-gray-700 mb-8 mt-2 border-b border-ihub-tealLight pb-4">Contract settings</h3>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                    <!-- Contract Name -->
                    <div class="col-span-1 md:col-span-2 border border-gray-200 rounded px-4 py-1 relative flex items-center h-[52px]">
                        <label class="absolute -top-[9px] left-3 bg-white px-1 text-[9px] text-gray-500 font-bold uppercase tracking-widest">Contract Name</label>
                        <span class="absolute -top-[9px] right-3 bg-white px-1 text-[9px] text-ihub-red font-bold uppercase tracking-widest">Mandatory</span>
                        <input type="text" name="name" th:value="${contract.name}" class="w-full h-full bg-transparent outline-none text-sm text-gray-800 pt-1 font-bold uppercase">
                        <span id="err-contract-name" class="text-xs text-red-600 block absolute -bottom-5" th:text="${#fields.hasErrors('contract.name')} ? ${#fields.errors('contract.name')[0]} : ''"></span>
                    </div>

                    <!-- Status Dropdown -->
                    <div class="col-span-1 border border-gray-200 rounded px-4 py-1 relative flex items-center h-[52px]">
                        <label class="absolute -top-[9px] left-3 bg-white px-1 text-[9px] text-gray-500 font-bold uppercase tracking-widest">Status</label>
                        <span class="absolute -top-[9px] right-3 bg-white px-1 text-[9px] text-ihub-red font-bold uppercase tracking-widest">Mandatory</span>
                        <select name="status" class="w-full bg-transparent outline-none text-sm text-gray-800 appearance-none pt-1 cursor-pointer font-bold">
                            <option value="DRAFT" th:selected="${contract.status == 'DRAFT'}">Draft</option>
                            <option value="ACTIVE" th:selected="${contract.status == 'ACTIVE'}">Active</option>
                            <option value="TERMINATED" th:selected="${contract.status == 'TERMINATED'}">Terminated</option>
                        </select>
                        <div class="absolute right-4 text-gray-400 pointer-events-none">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                        <span id="err-contract-status" class="text-xs text-red-600 block absolute -bottom-5" th:text="${#fields.hasErrors('contract.status')} ? ${#fields.errors('contract.status')[0]} : ''"></span>
                    </div>
                </div>

                <button type="submit" id="contract-submit-btn-hidden" class="hidden">Save Hidden</button>
                </fieldset>
            </form>
        </div>
    </div>
    
    <!-- Floating Action Buttons -->
    <div class="fixed bottom-8 right-8 flex flex-col gap-3 z-50" x-show="isEditMode" x-transition>
        <button type="button" @click="document.getElementById('contract-submit-btn-hidden').click()" id="contract-submit-btn" class="w-14 h-14 bg-ihub-teal hover:bg-[#12a1b0] rounded-full text-white shadow-lg flex flex-col items-center justify-center transition-transform hover:scale-105 active:scale-95 disabled:bg-gray-300">
            <span class="text-[10px] font-bold tracking-wider uppercase">Save</span>
        </button>
    </div>
    <div class="fixed bottom-8 left-8 z-50">
        <button type="button" hx-get="/dashboard/tab/contracts" hx-target="#tab-content" class="px-8 py-3 rounded-full border text-gray-600 font-bold border-gray-300 text-xs uppercase hover:bg-gray-50 transition-colors shadow-sm bg-white">
            Back
        </button>
    </div>
</div>
