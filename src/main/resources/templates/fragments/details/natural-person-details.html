<div th:fragment="panel" class="bg-white fade-in" th:attr="x-data='naturalPersonForm(' + (${person.id == null}) + ')'">
    <div class="flex items-center justify-between mb-6 border-b pb-4">
        <div class="flex items-center space-x-4">
            <button hx-get="/dashboard/tab/natural-persons" hx-target="#tab-content" class="text-gray-400 hover:text-indigo-600 transition-colors" title="Back to list">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </button>
            <h3 class="text-xl font-medium leading-6 text-gray-900" th:text="${person.id != null ? 'Natural Person Details' : 'Create Natural Person'}"></h3>
        </div>
    </div>
    <div class="w-full">
                <!-- VIEW MODE -->
                <div id="view-mode" x-show="!isEditMode">
                    <dl class="grid grid-cols-1 gap-x-4 gap-y-6 sm:grid-cols-2">
                        <div class="sm:col-span-1">
                            <dt class="text-sm font-medium text-gray-500">First Name</dt>
                            <dd class="mt-1 text-sm text-gray-900" th:text="${person.firstName}"></dd>
                        </div>
                        <div class="sm:col-span-1">
                            <dt class="text-sm font-medium text-gray-500">Last Name</dt>
                            <dd class="mt-1 text-sm text-gray-900" th:text="${person.lastName}"></dd>
                        </div>
                        <div class="sm:col-span-1">
                            <dt class="text-sm font-medium text-gray-500">Nationality</dt>
                            <dd class="mt-1 text-sm text-gray-900" th:text="${person.nationality}"></dd>
                        </div>
                        <div class="sm:col-span-1">
                            <dt class="text-sm font-medium text-gray-500">Date of Birth</dt>
                            <dd class="mt-1 text-sm text-gray-900" th:text="${person.dateOfBirth}"></dd>
                        </div>
                        
                        <!-- Address section -->
                        <div class="sm:col-span-2 mt-4 border-t pt-2">
                            <h4 class="text-sm font-semibold text-gray-500 mb-2">Address</h4>
                        </div>
                        <div class="sm:col-span-1">
                            <dt class="text-sm font-medium text-gray-500">Street Number & Name</dt>
                            <dd class="mt-1 text-sm text-gray-900" th:text="${(person.address?.streetNumber ?: '') + ' ' + (person.address?.streetName ?: '')}"></dd>
                        </div>
                        <div class="sm:col-span-1">
                            <dt class="text-sm font-medium text-gray-500">Building / Complement</dt>
                            <dd class="mt-1 text-sm text-gray-900" th:text="${(person.address?.building ?: '') + ' ' + (person.address?.addressComplement ?: '')}"></dd>
                        </div>
                        <div class="sm:col-span-1">
                            <dt class="text-sm font-medium text-gray-500">Zip / City</dt>
                            <dd class="mt-1 text-sm text-gray-900" th:text="${(person.address?.zipCode ?: '') + ' ' + (person.address?.city ?: '')}"></dd>
                        </div>
                        <div class="sm:col-span-1">
                            <dt class="text-sm font-medium text-gray-500">Country</dt>
                            <dd class="mt-1 text-sm text-gray-900" th:text="${person.address?.country}"></dd>
                        </div>
                    </dl>
                    
                    <div class="mt-5 sm:mt-6 sm:flex sm:flex-row-reverse border-t pt-4">
                        <button type="button" hx-get="/dashboard/tab/natural-persons" hx-target="#tab-content" class="mt-3 inline-flex w-full justify-center rounded-md border border-gray-300 bg-white px-4 py-2 text-base font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                            Back
                        </button>
                        <button type="button" @click="toggleEditMode()" class="inline-flex w-full justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-base font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 sm:w-auto sm:text-sm">
                            Edit
                        </button>
                    </div>
                </div>
                
                <!-- EDIT MODE -->
                <div id="edit-mode" x-cloak x-show="isEditMode">
                    <form th:fragment="edit-form" hx-post="/dashboard/details/natural-person" hx-target="#tab-content" id="np-form">
                        <!-- Trigger for OOB validation -->
                        <div hx-post="/dashboard/validate/natural-person" hx-trigger="keyup delay:500ms from:input, change from:select, customValidation from:body" hx-include="#np-form" hx-swap="none"></div>
                        <input type="hidden" name="id" th:value="${person.id}"/>
                        
                        <div class="grid grid-cols-1 gap-y-4 sm:grid-cols-2 gap-x-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">First Name <span class="text-red-500">*</span></label>
                                <input type="text" x-model.fill="firstName" name="firstName" th:value="${person.firstName}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
                                <span id="err-firstName" class="text-sm text-red-600 mt-1 block" th:text="${#fields.hasErrors('person.firstName')} ? ${#fields.errors('person.firstName')[0]} : ''"></span>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Last Name <span class="text-red-500">*</span></label>
                                <input type="text" x-model.fill="lastName" name="lastName" th:value="${person.lastName}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
                                <span id="err-lastName" class="text-sm text-red-600 mt-1 block" th:text="${#fields.hasErrors('person.lastName')} ? ${#fields.errors('person.lastName')[0]} : ''"></span>
                            </div>
                            <div class="relative" @click.outside="handleClickOutside()">
                                <label class="block text-sm font-medium text-gray-700">Nationality <span class="text-red-500">*</span></label>
                                <input type="text" autocomplete="off" placeholder="Type to search..." x-model.fill="searchQuery" @focus="showNationalityList = true" th:value="${person.nationality}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
                                <input type="hidden" name="nationality" x-model.fill="nationality" th:value="${person.nationality}">
                                <span id="err-nationality" class="text-sm text-red-600 mt-1 block" th:text="${#fields.hasErrors('person.nationality')} ? ${#fields.errors('person.nationality')[0]} : ''"></span>
                                <ul x-show="showNationalityList" x-cloak class="absolute z-10 w-full bg-white border border-gray-300 rounded-md shadow-lg max-h-40 overflow-auto mt-1">
                                    <template x-for="c in filteredCountries" :key="c">
                                        <li class="p-2 hover:bg-indigo-50 cursor-pointer text-sm font-medium text-gray-700" @click="selectCountry(c)" x-text="c"></li>
                                    </template>
                                    <li x-show="filteredCountries.length === 0" class="p-2 text-gray-500 text-sm">No matches</li>
                                </ul>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Date of Birth <span class="text-red-500">*</span></label>
                                <input type="date" x-model.fill="dateOfBirth" name="dateOfBirth" th:value="${person.dateOfBirth}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
                                <span id="err-dateOfBirth" class="text-sm text-red-600 mt-1 block" th:text="${#fields.hasErrors('person.dateOfBirth')} ? ${#fields.errors('person.dateOfBirth')[0]} : ''"></span>
                            </div>
                            
                            <!-- Address -->
                            <div class="sm:col-span-2 border-t mt-2 pt-2"><h4 class="text-sm font-semibold text-gray-500">Address</h4></div>
                            
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Street Number</label>
                                <input type="text" name="address.streetNumber" th:value="${person.address?.streetNumber}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Street Name</label>
                                <input type="text" name="address.streetName" th:value="${person.address?.streetName}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Building</label>
                                <input type="text" name="address.building" th:value="${person.address?.building}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Complement</label>
                                <input type="text" name="address.addressComplement" th:value="${person.address?.addressComplement}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Zip Code</label>
                                <input type="text" name="address.zipCode" th:value="${person.address?.zipCode}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">City</label>
                                <input type="text" name="address.city" th:value="${person.address?.city}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
                            </div>
                            <div class="sm:col-span-2">
                                <label class="block text-sm font-medium text-gray-700">Country</label>
                                <input type="text" name="address.country" th:value="${person.address?.country}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
                            </div>
                        </div>

                        <div class="mt-5 sm:mt-6 sm:flex sm:flex-row-reverse border-t pt-4">
                            <button id="np-submit-btn" type="submit" th:disabled="${isValid != null ? !isValid : #fields.hasErrors('person.*')}" class="inline-flex w-full justify-center rounded-md border border-transparent bg-indigo-600 px-4 py-2 text-base font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 sm:ml-3 sm:w-auto sm:text-sm disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors">
                                Save
                            </button>
                            <button type="button" hx-get="/dashboard/tab/natural-persons" hx-target="#tab-content" class="mt-3 inline-flex w-full justify-center rounded-md border border-gray-300 bg-white px-4 py-2 text-base font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 sm:mt-0 sm:w-auto sm:text-sm">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
    </div>
</div>
